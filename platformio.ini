[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_unflags =
    -std=gnu++11
    -std=gnu++14
    -std=gnu++17
build_flags = -std=c++2a

[env:remote]
board = esp32dev
build_src_filter = -<*> +<remote/>

[env:receiver]
board = esp32-s2-saola-1
build_src_filter = -<*> +<receiver/>
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1
